name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    permissions:
      contents: write # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get version from app.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          
      - name: Build Unsigned App
        run: |
          cd ios
          xcodebuild -workspace Vaultleg.xcworkspace \
            -scheme Vaultleg \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv Vaultleg.app Payload/
          zip -qr ../../../../../Vaultleg.ipa Payload

      - name: Generate AltStore source.json
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          cat > altstore-source.json << EOF
          {
            "name": "Vaultleg",
            "identifier": "com.darren.vaultleg.source",
            "apps": [
              {
                "name": "Vaultleg",
                "bundleIdentifier": "com.darren.vaultleg",
                "developerName": "Darren",
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "downloadURL": "https://github.com/${REPO}/releases/download/v${VERSION}/Vaultleg.ipa",
                "localizedDescription": "Personal finance tracker.",
                "iconURL": "https://raw.githubusercontent.com/${REPO}/main/assets/icon.png",
                "tintColor": "00E5FF",
                "size": 0
              }
            ]
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Vaultleg v${{ env.VERSION }}
          body: |
            ## Vaultleg v${{ env.VERSION }}
            
            ### Install via AltStore / Sideloadly
            Download `Vaultleg.ipa` below and sideload it using AltStore or Sideloadly.
            
            ### AltStore Source URL
            Add this source to AltStore for auto-updates:
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
            ```
          files: |
            Vaultleg.ipa
            altstore-source.json
          draft: false
          prerelease: false

      - name: Commit updated altstore-source.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp altstore-source.json altstore-source.json.bak
          git fetch origin main
          git checkout main
          cp altstore-source.json.bak altstore-source.json
          git add altstore-source.json
          git diff --staged --quiet || git commit -m "chore: update AltStore source to v${VERSION}"
          git push origin main
